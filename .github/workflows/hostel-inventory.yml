name: Hill Station Hostel Inventory

on:
  schedule:
    - cron: "30 4 * * *"
  workflow_dispatch:
    inputs:
      quick_test:
        description: "Quick test (2 hostels per city, 3 days) instead of full 90-day run"
        required: false
        default: "false"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: hostel-pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pandas pyyaml python-dateutil

      - name: Restore inventory database
        uses: actions/cache@v4
        id: inventory-cache
        with:
          path: data/inventory.db
          key: hostel-inventory-db
          restore-keys: |
            hostel-inventory-db

      - name: Collect inventory
        timeout-minutes: 180
        run: |
          mkdir -p data logs
          if [ "${{ github.event.inputs.quick_test }}" = "true" ]; then
            python -m src.collector --days 3 --city ooty --property-id 292129 --property-id 316864
            python -m src.collector --days 3 --city kodaikanal --property-id 293090 --property-id 332361
          else
            python -m src.scheduler --force
          fi

      - name: Export web dashboard data
        run: python -m src.export_for_web --output site

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
